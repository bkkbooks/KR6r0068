body:
  text: 雲間沙門士衡敬編吾宗九世祖師示生東西兩土前後出興相去賒遠故感應垂迹之事散在經傳儻非博覽則不可得而詳也以山家傳習者而於祖師功德罕測厥由於乎先儒有言其先祖無美而稱之是誣也有善而弗知不明也知而弗傳不仁也此三者君子之所恥也而況於學教之人乎愚忝末裔姑欲逃其弗傳之責謹搜羅載籍備録于右以貽後賢顗弘贊無窮思齊有地而不為無補矣時嘉定改元臘月望日寓竺峯凝翠軒序高祖龍樹菩薩二祖北齊尊者三祖南嶽尊者四祖天台教主智者大師五祖章安尊者六祖法華尊者七祖天宮尊者八祖左溪尊者九祖荊溪尊者高祖龍樹菩薩者南天竺國梵志種大豪貴家也始生於樹下由龍成道因號龍樹幼而聰哲才學超世處在襁褓上舉兩切下音保小兒衣也聞諸梵志誦四韋陀典各四萬偈偈有四十二字背誦其文又領其義弱冠馳名獨步諸國世學藝能天文地理圖緯祕讖及餘道術無不綜練上子宋切下郎殿切結友三人亦一時之傑一日相與議曰天下義理可以開神明悟幽旨者吾等盡之矣更以何方自娛唯有追求好色縱情極欲是不亦樂乎然諸梵志勢非王公何由得之可求隱身之術斯樂可辦四人相視莫逆於心同至術家求隱身法術師念曰此四梵志擅名一世草芥群生今以術故屈辱就我此人才明絶世所不知者唯此賤法若授其方則永見棄且與彼藥使不知之藥盡必來永當師我各與青藥一丸告曰汝於靜處以水磨之用塗眼驗形當自隱龍樹磨藥聞香盡知藥名分數多少錙銖上音緇下音殊無失還向其師具陳此藥有七十種名字兩數皆如其方術師驚問子何以知答曰藥有氣分何以不知師即歎服乃曰若斯人者聞名猶難況我親遇而惜斯術即以其法具授四人得術隱身遊百自在入王宮中宮中美人皆被侵陵百餘日後懷妊者衆以事白王王不悅曰此何不祥召諸智臣以問其故時有一臣白王此之所為不出有二一鬼二術可以細土置諸門中令人守衛斷往來者若是方術足迹自現若是鬼魅入必無迹人可兵除鬼當呪滅王用其計備法試之見四人迹即閉諸門數百力士揮刀空中斬三人首近王七尺刀所不至唯有龍樹斂身屏氣依王而立故不被斬因時始悟欲為苦本厭欲心生發出家願我若得脫當詣沙門求出家法既而得出入山至一佛塔出家受戒九十日中誦三藏盡通諸深義更求異典都無得處遂向雪山見一比丘以摩訶衍而授與之讀誦愛樂雖達實義未獲道證辨才無盡善能言論外道異學沙門義士咸皆摧伏請為師範即便自謂我是一切智人生大憍慢心自念言世界法中津途無量佛經雖妙句義未盡我今更敷演之開悟後學作是念已便欲為之立師教戒更造衣服令附佛法而少有不同欲除衆情示不受學選擇良日便欲行之獨處靜室水精地房大龍菩薩愍其若此即以神力接入大海至其宮殿開七寶函以諸方等深奧經典無上妙法授與披讀九十日中通解甚多其心深入體得實利龍知其心而問之曰看經遍未答曰汝經無量不可得盡我所讀者足滿十倍過閻浮提龍言忉利天上所有經典倍過於此百千萬倍諸處此比不可稱數爾時龍樹既得諸經豁然通達善解一相深入無生法忍具足龍知悟道還送出宮時南天竺王生大邪見承事外道毀謗正法龍樹為化彼故躬持赤幡在王前行經歷七年王始怪問汝是何人在吾前行答曰我是一切智人王聞是已為之大驚遂問之曰一切智人甚為希有汝自言是何以取驗答曰王欲知者宜當見問王即自念我為智主大論議師問之能屈未足為奇或不如彼此非小事默然不問便是一屈遲疑良久俯仰問曰天今何為答曰天今正與阿修羅戰王既聞已譬如人噎乙結切既不得吐又不得咽音咽欲非其言無以為證欲是其事無以為明擬議之間龍樹復言此非虛論王小待之須臾當驗語訖空中刀劍戈戟相繼而落王言干戈矛矟上音謀建於兵車長二丈下音朔丈八曰矟雖是戰器那知是天與修羅戰答曰以之虛言不如驗之以實言已修羅耳鼻從空而下又令王臣衆等見空中兩陳相對王始稽首受其道化殿上萬婆羅門因就出家時於此國大弘佛教摧伏外道廣開摩訶衍義造優波提舍十有萬偈莊嚴佛道大慈方便如是等論各五千偈今摩訶衍教大行於天竺造無畏論滿十萬偈中論出無畏部中凡五百偈時有婆羅門善知呪術欲以己能與龍樹爭勝白彼王言我能伏此比丘王言汝甚愚癡此菩薩者明同日月智齊衆聖汝今庸劣豈可為比婆羅門言王為智人宜以理驗大王云何逆見凌懱莫結切侮也王見言至恭請龍樹清旦俱集政德殿時婆羅門即於殿前呪作大池廣長清淨池中出生千葉蓮華自坐其上語龍樹曰汝處於地類同畜生我居華上智慧清淨寧敢與我抗言議論爾時龍樹亦以呪力化為白象象有六牙行池水上趣其華座以鼻繳音皎纏也拔高舉擲地時婆羅門傷背委困即便摧伏歸命龍樹我甚頑嚚犯逆大師惟願愍哀聽我悔過龍樹慈矜度令出家時有一小乘法師見其高明常懷忿嫉龍樹深知既所作已辦緣謝化成將欲示寂因問小乘師汝今樂我久住世否彼曰仁者實不願也於是龍樹即入靜室經日不出弟子咸疑推戶視之遂見蟬蛻音稅而去天竺諸國並為立廟種種供養敬事如佛其母樹下生之因字阿周陀那阿周陀那樹名也以龍成其道故以龍配字號曰龍樹假餌仙藥長壽住世三百餘年任持佛法其所度人不可稱數如付法藏傳入楞伽經第六云大慧汝當知善逝涅槃後未來世當有持於我法者南天竺國中大名德比丘厥號為龍樹能破有無宗世間中顯我無上大乘法得初歡喜地往生極樂國此佛金口懸記也二祖北齊尊者諱慧文德行未見本傳當齊高之世齊是國號高謂高祖渤海人也姓高氏齊大夫高奚之後高歡次洋方受魏禪都鄴在相州即北齊也獨步河淮無競化者故云河北淮謂南行化於世法門非世所知明所證既深非餘所知履地戴天莫知高厚尊者法行於世如履地不知地之厚戴天不知天之高尊者用心一依釋論論是龍樹所説準付法藏龍樹是金口祖承第十三師尊者橫承稟以為師也故翰林梁肅曰大雄示滅學路派別世既下衰教亦陵遲故龍樹大士病之遂用權略制諸外道乃括十二部經發明宗極微言東流我北齊禪師得之由文字中入不二法門以授南嶽斯言盡之後學尊敬不敢正斥其諱以北齊尊者稱焉三祖南嶽尊者諱慧思姓李氏武津人也少以寬慈頂生肉髻耳有重輪象視牛行勝相莊嚴與世自異嘗夢梵僧勉令出俗駭悟斯瑞辭親入道奉持守素梵行清潔及稟具戒日唯一食不受別施回栖幽靜杜絶將迎誦法華等經所至小庵被人所焚隨顯癘音例疫病疾求誠乞懺還創草室持經如故其患平復仍夢梵僧數百形服瓌公回切大也異祈請師僧加羯磨法具足成就驚寤方知夢受勤務更深無棄昏曉又夢彌勒與諸眷屬同會龍華心自惟曰我於釋迦末法受持法華今值慈尊感傷悲泣豁然覺悟轉復精進靈瑞重沓達合切供養嚴備若有天童侍衛因讀妙勝定經歎禪功德發心修定時北齊禪師聚徒數百衆法清肅道俗高尚乃往歸依從受正法性樂苦節營僧為業冬夏供養不憚勞苦晝夜攝心理事籌音儔算也度訖此兩時未有所證又於來夏束身長坐繫念在前始三七日發少靜觀見一生善惡業相倍復勇猛遂動八觸發本初禪禪障忽起四肢緩弱不勝行步身不隨心即自觀察我今病者皆從業生業由心起本無外境反見心源業非可得身如雲影相有體空如是觀已顛倒想滅心性清淨所苦消除又發空定心境廓然夏竟受歲慨口概切太息也無所獲自傷昏沈生為空過深懷慚愧放身倚壁背未至間霍忽郭切揮霍也爾開悟法華三昧大乘法門一念明達十六特勝背捨徐入便自通徹不由他悟研練愈久前觀轉增名行遠聞四方欽德學徒日盛機悟實繁乃以大小乘中定慧等法敷揚引喻用攝自他衆雜精麁是非由起怨嫉鴆直禁切以毛歷飲食能殺人毒毒所不傷異道興謀謀不為害乃顧徒屬曰大聖在世不免流言況吾無德豈逃此責責是宿作時至須受此私事也然我佛法不久應滅當往何方以避此難時空聲曰若欲修定可往武當南嶽是入道山也以齊武平之初背此嵩陽領徒南逝初至光州值梁孝元傾覆國亂前路梗塞權止大蘇山數歲之間歸從如市每示衆曰道源不遠性海非遙但向己求莫從他覓覓亦不得得亦非真由是供以事資誨以理味秖欲學者悟自本心因以道俗福施造金字般若金字法華琉璃寶函衆請講二經即時玄敘隨文造盡莫非幽賾後命大師代講金經至一心具萬行處大師有疑師曰汝向所疑此乃大品次第意耳未是法華圓頓旨也吾昔一心頓發諸法吾既身證不勞致疑遂咨受法華行法三七境界大領玄旨又咨師位即十地耶曰非也吾十信鐵輪位耳然其謙退言難見實本迹叵詳後在大蘇弊於烽警上音峯烽燧候表也邊有警則舉火晝曰燧夜曰烽山侶栖遑不安其地將四十餘僧徑趣南嶽時陳光大二年歲次戊子夏六月二十二日也至即告曰吾止此滿十年耳先是梁僧慧海居衡嶽寺及見師欣如舊識以寺請師止之海遷他所師復徙衆方廣靈迹懋異具如別記嘗曰吾前世曾履此處因遊嶽頂遲立林泉其處竦淨若有所憶尋指巖叢曰吾前身於此入定賊斬吾首衆共掘之獲聚骨果無首今名一生巖者是也復指盤石曰此下亦吾前世骸骨衆舉石驗果得紅白骨聯若鉤鎖即其地纍石瘞於罽切埋也骨危其巔為二生塔徘徊東上見石門窅隩上音杳曰此靈巖幽戶過者必增道力乃古寺也吾先亦嘗捿托因斧蒙密處果得僧用器皿堂宇層甓並的切甎也之基其地爽塏高明之地曰爽塏左傳曰請更諸爽塏文選曰處高泉而爽塏適大嶽心於是築臺為衆説般若因號三生藏事驗非一陳朝碩學莫不歸宗時有異道懷嫉密告陳主誣師北僧陰受齊券掘斷嶽心敕使至山見兩虎咆憤驚駭而退數日復進召師師謂使曰尊使先行貧道續來師飛錫而往至京四門俱見師入監使同時共奏帝驚異引見敕承靈應乃迎下都止栖玄寺一無所問先有小蜂飛螫師額尋有大蜂咬殺小者銜首師前飛揚而去不久謀罔一人暴死二為猘居例切狂犬宋書曰張收嘗為猘犬所傷食蝦蟆鱠而愈狗嚙死蜂相所徵於是驗矣師往瓦官遇雨不濕履泥不污僧正慧皓音杲與諸學徒相逢於路曰此神異人如何至此舉朝屬目道俗傾仰大都督吳明徹敬重之至奉以犀枕別將夏侯孝威往寺禮覲在道默念吳儀同所奉枕欲得一見比至師所將行致敬師便語威欲見犀枕可往視之又於一日忽有聲告灑掃庭宇聖人尋至即如其語須臾師到威懷仰之言於道俗故貴賤皂素悉歸向之趣歸南嶽不敢延留帝餞以殊禮目為大禪師人船供給送到江渚師曰寄迹南嶽止十年耳期滿當移時衆不識其旨及還山每歲陳主三信參勞供施衆積榮盛莫加説法倍常神異難測或現形大小或寂示藏身或異香奇色祥瑞亂舉臨將終時從山頂下半山道場大集門學連日説法苦切呵責聞者寒心告衆曰若有十人不惜身命常修法華般舟念佛三昧方等懺悔行是行者隨有所須吾自供給必相利益如無吾當遠離苦行事難竟無答者因屏衆斂念泯然命盡小僧靈辨見師氣絶號吼大叫師便開目曰汝是惡魔我將欲去衆聖相迎論受生處何意驚動妨亂吾耶癡人出去因更攝心諦坐至盡咸聞異香滿室頂暖身軟色如生春秋六十有四即陳太建九年歲次丁酉六月二十二日也取驗十年宛然符合師平日服布素寒則實以艾徒屬服章率皆如此凡有著作口授成章無所刪改四十二字門兩卷無諍行門兩卷釋論玄隨自意安樂行次第禪要三智觀門等五部各一卷並行于世南山律師贊曰自江東佛法弘重義門至於禪法蓋蔑如也而南嶽尊者慨思南服定慧雙開晝談義理夜便思擇故所發言無非致遠因定發慧此旨不虛南北禪宗罕不承緒然而身相挺特能自勝持見者回心不覺傾伏善識人心鑒照冥機訥於言過方便誨引行大慈悲奉菩薩戒至如繒纊皮革多由損生故其徒服章率皆以布寒則艾衲用犯風霜自佛法東流幾六百載唯斯南嶽慈行可歸余嘗參傳譯屢覩梵經討問所被法衣至今都無蠶服縱加受法不云得成若乞若得蠶綿作衣準律結科斬捨定矣約情貪附何由縱之唯南嶽獨斷高遵聖檢居奄切書檢印窠封題也者也四祖智者大師諱智顗字德安姓陳氏頴川人也有晉遷都寓居荊州華容縣梁散騎益陽公起之第二子也母徐氏夢香煙五彩縈回在懷欲拂去之聞語曰宿世因緣寄託王道福德自至何以去之又夢吞白鼠如是再三怪而卜之師曰白龍之兆也誕育之夜本朝翰林學士扈蒙序云大師梁大同四年戊午秋七月生室內洞明信宿其光乃止內外胥悅盛陳鼎爼相慶忽二僧扣門曰善哉兒德所重必出家矣言訖而隱賓客異之鄰室憶先靈瑞呼為王道兼用後相復名光道故先立二字參互稱之臥便合掌坐必面西年長而口不妄噉徒敢切見像便禮逢僧必敬七歲喜往伽藍諸僧訝魚稼切其情志口授普門品初啓一遍即得二親遏絶不許更誦志學之年士梁承聖屬元帝淪沒北度硤州依乎舅氏而俊朗通悟儀止溫恭尋討名師年十有八投湘州果願寺法緒出家緒授以十戒道品律儀仍攝以北度詣慧曠律師北面橫經具蒙指誨又詣光州大蘇山南嶽禪師受業心觀乃於此山行法華三昧始住三夕誦至藥王品心緣苦行至是真精進句解悟便發見共思師處靈鷲山七寶淨土聽佛説法思為印可又入熙州白沙山如前入觀於經有疑輒見思來冥為披釋常令代講思躬執如意在觀聽語學徒曰此吾之義兒恨其定力少耳於是師資改觀名聞遐邇學成往辭思曰汝於陳國有緣往必利益思既遊南嶽大師便詣金陵云云綿歷八周語默之際每思林澤乃夢巖崖萬重雲日半垂其側滄海無畔泓澄其下又見一僧搖手申臂至于岐麓挽師上山云云以夢通告門人咸曰此天台山也因與慧辨等二十餘人挾道南征隱淪斯嶽後陳少主降敕徵入前後七使並帝手疏大師遂出都迎入太極殿之東堂請講智論云云及金陵敗覆策杖荊湘剗迹雲峯終焉其致會大業在蕃任總淮海承風佩德欽注相仍欲遵戒法奉以為師致書纍請大師初陳寡德次讓名僧後舉同學三辭不免開皇十一年十一月二十三日於揚州總管金城設千僧會敬屈授菩薩戒為王授戒竟欲返故林王乃固請師曰先有明約事無兩違即拂衣而起王不敢重邀合掌尋送至城門顧曰國鎮不輕道務致隔幸觀佛化弘護在壞王禮望目極銜泣而返遂上渚宮鄉壤於當陽縣玉泉山建一音寺晉王仍請大師著淨名疏柳顧言徐陵並才華胄直又切績應奉文義緘封寶藏王躬受持後蕭妃疾苦醫無術王遣開府柳顧言等致書請命願救所疾師即率侶建齋七日行金光明懺至第六夕忽降異雀飛入齋壇宛轉而死須臾飛去又聞啄吟之聲衆並同矚師曰此相現者妃當愈矣鳥死復穌表蓋棺還起喙幽鳴顯示齋福相乘至翌日患果瘳王大嘉慶時遇入朝大王入朝也旋歸台嶽躬率禪門更行前懺仍立誓曰若於三寶有益者當限此餘年若其徒生願速從化不久告衆曰吾當卒此地矣誡曰宜各默然吾將去矣言已端坐如定而卒於天台山大石像前春秋六十有七即開皇十七年十一月二十四日也師居山有菌觸樹皆垂隨採隨出供僧常調師若他往菌即不生因斯以談誠道感矣章安侍奉多年歷其景行可二十餘紙又終南山龍田寺沙門法琳夙預宗門親傳戒法以德音遽遠拱木俄森為之行傳廣流於世隋煬帝末歲巡幸江都夢感大師言及遺寄希自製碑文極宏麗未及鐫勒值亂便失餘如別傳云五祖章安尊者諱灌頂字法雲俗姓吳氏常州宜興人也祖世避地東甌因而不返今為臨海之章安焉父夭早亡母親鞠養生甫三月孩而欲名思審物類未知所目母夜稱佛法僧名師仍口斆音句清辨同共驚異因告攝靜寺慧拯法師聞而歎曰此子非凡即以非凡為字及年七歲還為拯公弟子日進文詞玄儒並騖清藻才綺即譽當時年登二十進具奉儀德瓶油鉢彌所留思洎拯師厭世沐道天台承習定網罔有虧緒陳至德元年從大師出居光宅研繹觀門頻蒙印可逮陳氏失馭隨師上江州勝地名山盡皆遊憩三宮廬阜九向衡峯無不揖迹依迎訪問遺逸後屆荊部停玉泉寺傳法轉化教敷西楚開皇十一年晉王作鎮揚州陪從大師戾郎計切來也止邗溝邗音寒邗溝水名在廣陵居禪衆寺為法上將日討幽求俄隨大師東旋止于台嶽晚出稱心精舍開講法華跨朗籠基超於雲印方集奔隨負笈屯涌有吉藏法師興皇入室嘉祥結肆獨擅浙東聞稱心道勝意之未許求借義記尋閲淺深乃知體解心醉有所從矣因廢講散衆投足天台餐稟法華發誓弘演至十七年大師現疾瞻侍曉夕艱劬盡心爰及滅度親承遺旨乃奉留書并諸信物哀泣跪授晉王五體投地悲淚頂受事遵賓禮情敦法親尋遣揚州總管府司馬王弘送師還山為大師設千僧齋置國清寺即昔有晉曇光道猷之故迹也前峯佛隴寺號修禪在陳之日大師初建隴南十里曰丹丘經行平正瞻望顯博大師標基刊本欲建道場未果心期故遺囑斯在王工入谷即事修營置臬古公切引繩一依舊旨仁壽元年晉王入嗣采巡本國萬里川途人野畢慶以檀越升位寺宇初成出山參賀遂蒙引見慰問重疊酬對如響言無失厝臣主榮歎前遣員外散騎侍郎張乾威送還山寺施物三千段氈三百領又設千僧齋寺廟臺殿更加修緝故丹青之飾亂發朝霞松竹之嶺奄同被錦斯實海西之壯觀也遠符大師之言具如別傳仁壽二年下令延請云夏序炎赫道體休宜禪悅資神故多佳致近令慧日道場莊論二師講淨名經全用智者義疏判釋經文禪師既是大師高足法門委寄今遣延屈必希霈然并華經疏隨使入京也佇遲來儀書不盡意師持衣負錫高步入宮三夏闡弘副君欣戴每至深契無不伸請並隨問接對周統玄籍後遣信送還嚫遺隆倍大業七年治兵涿野親總元戎將欲蕩一東夷用清文軌因問左右備敘軒皇先壯阪泉之戮暴後歎洞山之問道追思大師感慕動容下敕迎師遠至行所引見天扆於蟻切天子所居也敘以同學之歡又遣侍郎吳旻送還台寺爾後王人繼至房無虛月師縱懷丘壑絶迹世纍定慧兩修語默雙化乃有名僧大德近城遠方希覩三觀十如及以心塵使性並拜手投身請祈天鼓皆疏瀹情性澡雪胸襟三業屢增二嚴無盡忽以貞觀六年八月七日終于國清寺房春秋七十有二初薄示輕疾無論藥療而室有異香臨終命弟子曰彌勒經説佛入城日香煙若雲汝多燒香吾將去矣因伸遺誡詞理妙切門人衆侶瞻仰涕零忽自起合掌如有所敬發口三稱阿彌陀佛低身就臥纍手當心色白歡愈奄然而逝舉體柔軟頂暖經日嘗有同學智晞大師親度清亮有名先以貞觀元年卒臨終云吾生兜率矣見師智者寶座行列皆悉有人惟一座獨空云却後六年章安法師升此説法焚香驗旨即慈尊降迎計歲論期審晞不謬矣以其月九日窆保驗切下棺也于寺之南山遠近奔號喧震林谷初師化流囂俗神用弘方村人於法龍去山三十餘里染患將絶衆治不愈其子奔馳入山祈禱求救師為轉法華經焚栴檀香病者雖遠乃聞檀香入鼻應時痊復又樂安南嶺地曰安洲碧樹清溪泉流伏溺人徑不通師留連愛玩顧而誓曰若使斯地夷坦當來此講經曾未浹旬白沙通涌平如玉鏡師以感通相顯不違前願仍講法華金光明二部用酬靈意嘗於章安攝靜寺講涅槃經值海賊上抄道俗奔委師方撾鍾就講顏無懾章涉切怯也懼賊徒麾幡詣寺忽見兵旗曜日持弓執戟人皆丈餘雄悍奮發群覩驚憚一時退散嘗於佛隴講暇携引學徒纍石為塔別須二片用搆塔門弟子光英先以車運一石咸疑厚大更欲旁求復勞神力師舉杖聊撝前所運石颯然驚列説文曰列分解也遂折為兩段厚薄等均用施塔戶宛如舊契若斯靈應其相實多自師受業天台又稟道衡嶽南嶽天台三世相繼宗歸莫二若觀若講常依法華又講涅槃金光明淨名等經及説圓頓止觀四念等法門其遍不少且智者辨才雲行雨施或同天網乍擬瓔珞能領唯師一人其私記大師詞旨及自製義記并雜文等題目並勒于碑陰弟子光英後生標俊優柔教義與國清寺衆僉共紀其行樹其碑于寺之門常州弘善寺沙門法宣為文其詞甚麗見于別集六祖法華尊者諱智威姓蔣氏縉雲人也頴脫塵蒙心遊物表少事師于軒轅氏鍊丹山聞天台宗教盛遂負笈往沃洲石城寺親章安禪師求請心要既而得一融道體二居宗定慧方均寂照相半雖曰自了急在利他天與多能富有辭藻著桃巖寺碑與頭陀寺碑氣度相來後以法眼付授小威焉時傳威是徐陵後身其智利雄才斷可知矣七祖天宮尊者諱慧威姓留氏東陽人也𩭳角之年露其舊習抉開愛網徑入空門不滯一方仍參三益聞縉雲大威禪師盛行禪法裹足造焉刻志忘勞覩威牆奧一日千里罔不推稱至有成業時謂小威然其樂靜居山罕交人事指教門人不少傑出者左溪一人而已師嘗修止觀匪棄光陰説與行而並馳語將默而齊貫落然汪汪然人無德而名焉八祖左溪尊者諱玄朗字慧明姓傅氏其先浦陽郡江夏太守拯公之後曹魏世避地于江左則梁大士翕之六代孫遂為烏傷人也母葛氏初妊夢乘羊車飛空躡虛而覺身重自茲已後葷血惡聞殆乎産蓐亦如初寐後心輕體安嬰兒不啼唍胡板切小笑貌爾而笑九歲出家師授其經日過七紙如意元年閏五月十九日敕度配清泰寺弱冠遠尋光州岸律師受滿足戒旋學律範又博覽經論搜求異同尤切涅槃常恨古人雖有章疏判斷未為平允往在會稽妙喜寺與印宗禪師商榷音角揚榷大舉祕要雖互相述許大旨未周聞天台一宗可以清衆滯可以趣一理因詣東陽天宮寺小威法師竭力以親附之不患貧苦達法華淨名大論止觀禪門等凡一宗之教迹研核至精後依恭禪師重修觀法博達儒書兼間道宗無不該覽雖通諸見獨以止觀以為入道之程作安心之域雖衆聖繼想而以觀音悲智為事行良津遊心十乘諦冥三觀四悉利物六即體遍雖致心物表身厭人寰情捐舊廬志栖林壑唯十八種十二頭陀隱左溪巖因以為號獨坐一室三十餘秋麻紵為衣糲蔬充食有願生兜率宮必資福事乃營殿壁繢觀音賓頭盧像乃焚香斂念便感五色神光道俗俱瞻嘆未曾有此後或猿玃來而捧鉢或飛鳥息以聽經時有盲狗來至山門長嘷宛轉于地師憫之焚香精誠為狗懺悔不踰旬日雙目豁明至開元十六年刺史王止容屈師出山暫居城下師辭疾仍歸本居厥後誨人匪倦講不待衆一鬱多羅四十餘年一尼師壇終身不易食無重味居必偏廈非因尋經典不然一燭非因覲聖容不行一步其細行修心蓋徇律法之制遂得遠域沙門鄰境耆耋擁室填門若冬陽夏陰弗召而自至也其寺宇凋弊乃指授僧靈稟建其殿宇形像纍二甎塔繢事不用牛膠悉調香汁天台之教鼎盛何莫由斯也心不離定中口不嘗藥味耄期之歲同於壯齡一日顧謂門人曰吾衆事云畢年旦暮焉六即道圓萬行無得戒為心本汝等師之天寶十三年九月十九日薄疾而終春秋八十有僧夏六十有一四輩號慟如慕如疑香木幢幡雷動山谷鄉人或夢師居寶閣第四重者寤告鄰與之夢協兜率天者第四天也願力所屆廣度人天既荼毗已門人分半舍利建塔於州之東源申永慕也生嘗撰法華經科文二卷付法弟子衢州龍丘寺道賓淨安寺慧從越州法華寺法源神雍常州福業寺守真蘇州報恩寺道遵明州大寶寺道原婺州開元寺清辨齠年慕道志意求師不踰三年思過半矣行其道者號左溪焉第其傳法號八祖矣禹山沙門神回著乎真贊九祖荊溪尊者諱湛然姓戚氏世居晉陵之荊溪則常州人也家本業儒師獨有拔俗之志童𮯁邈上初謹切毀齒也下亡卓切遠也焉異於常倫年二十餘受經於左溪左溪與之言大駭異日左溪謂曰汝何夢乎對曰疇昔之夜夢披僧服掖二輪遊大河之中左溪曰噫汝當以止觀二法度群生於生死淵乎乃授以本師所弘之法師德宇凝粹神鋒爽拔其密識深行沖氣慧用方寸之間合於天倪至是始以處士傳道學者悅隨如群流趣於大川也天寶初年解逢掖而登僧籍遂往越州曇一律師法集廣尋持犯開制之律範焉復於吳郡開元寺敷行止觀無何左溪捐代挈密藏獨運於東南謂門人曰道之難行也我知之矣古先至人靜以觀其本動以應乎物二俱不住乃蹈于大方今之人或蕩於空或膠於有自病病他道用不振將欲取正捨豫誰歸於是大啓上法旁羅萬行盡攝諸相入於無間即文字以達觀導語默以還源乃廣祖師所傳章句凡十數萬言心度諸禪身不踰矩三學俱熾群疑日潰求珠問影之類稍見罔象之功行止觀之盛始師之力也天寶末大曆初詔書連徵辭疾不就當大兵大飢之際揭厲法流學徒愈繁瞻望堂室以為依怙然慈以接之守之大布而衣一床而居以身誨人耆艾不息建中三年二月五日示疾佛隴道場顧語學徒曰道無方性無體生歟死歟其旨一貫吾歸骨此山報盡今夕要與汝輩談道而訣夫一念無相謂之空無法不備謂之假不一不異謂之中在凡為三因在聖為三德爇炷則初後同相涉海則淺深異流善利利人在此而已爾其志之言訖隱几泊白各切揚雅草玄曰自守泊如也如而化春秋七十有二法臘三十四門人號咽奉全身起塔祔音附于智者大師塋兆西南隅焉入室弟子吳門元浩可謂邇其人近其室矣然平日輯纂教法明決前疑開發後滯則有法華釋籤法華疏記各十卷止觀輔行傳弘訣十卷法華三昧補助儀一卷方等懺補闕儀二卷略維摩疏十卷維摩疏記三卷重治定涅槃疏十五卷金錍論一卷及止觀義例止觀大意文句十妙不二門等盛行于世述三部記成師親書寄姑蘇開元寺大藏語刊小石碑至今存焉亦録於此庶見慈悲為人之心也其又曰開元十六年首遊浙東尋師訪道至二十年於東陽金華遇方巖和尚示以天台教門授止觀等本遂求學於左溪大師蒙誨以大旨自惟識昧凡所聞見皆紀於紙墨暨至德中移隸此寺乾元已來攢成卷軸蓋欲自防迷謬而四方道流偶復傳寫今自覺衰疾諸無所任留此本兼玄疏兩記共三十卷以寄此藏儻於先師遺文碑補萬一則不負比來之誠幸衆共守護以貽後學大曆十二祀孟秋沙門湛然記贊寧曰詳夫師始天寶終建中以自證之心説未聞之法經不云乎云何於少時大作佛事吾師有焉其朝達得其道者唯梁肅學士故摛恥離切舒也鴻筆成絶妙之辭彼題目云嘗試論之聖人不興其間必有命世者出焉自智者以法傳章安章安再世至於左溪明道若昧待公而發乘此寶乘煥然中興蓋受業身通者三十有九僧搢紳先生高位崇名屈體承教者又數十人師嚴道尊遐邇歸仁向非命世而生則何以臻此觀夫梁學士之論擬議偕齊非此人何以動鴻儒非此筆何以銘哲匠蓋洞入門室見宗廟之富故以是研論矣吁吾徒往往有不知師之道詩云維鵲有巢維鳩居之梁公深入佛之理窟之謂歟有會稽法華山神雍作真讚至大宋開寶中吳越國王錢氏追重而誄之號圓通尊者焉可不是歟輔行一云龍樹龍接入宮一夏但誦七佛經目玄注云大不思議經有三本有十萬偈四十八品龍樹誦出流傳于世上天竺門生惟椿裒率山中同學刊板至顓齊沐敬書以廣流通共期佛慧時皇宋嘉定辛未夏制六月旦日謹識瑪瑙住山有朋附道邃和上行迹又作行業記大唐天台沙門乾淑述和上俗姓王氏琅瑘苗裔桑梓西京繡衣繼代不可具委身乃授監察御史解組辭榮從師學道年二十四方乃進具於秦地學戒既達持犯思學大乘原本無學字龍城沙門忍鎧依內證血脈譜正之遂寫慈恩法華疏於夜夢見一僧而語曰何不聽於天台圓頓宗旨至明旦乃向衆人陳説夢事衆人曰既有夢豈無其徵承常州妙樂寺湛然闍梨今盛傳弘此教時雖聞其語未為的實後有信至方知不虛乃捨所寫振錫南行到揚州法雲寺欲住旬日又夢見一僧語曰妙樂講經已欲至方便品今可速往因乃馳趣果如其夢集業五年本按集字當作習字更無他事以燭繼晝麟角業成乃辭師獨行師曰隨方而住隨分宣傳縱自修行亦為利益遂却至揚府被人請講法華止觀玄文各得數遍後入天台於路至越州見御史端公後除歙州刺史陸參拜為和上本按陸字恐剩後至貞元十二年入天台居山九年講法華止觀玄文等未曾有闕六時行道法華一部大小乘戒日常一遍未嘗不周二十年台州刺史請下龍興講法華止觀至今年二月因勾當本國教門且暫停耳但乾淑隨和上始得十年在前之事悉不具知略書而已
